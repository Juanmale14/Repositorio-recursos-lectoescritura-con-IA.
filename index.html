<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos digitales - Repositorio v2</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #0ea5e9;
            --accent-hover: #0284c7;
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.05) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(124, 58, 237, 0.05) 0, transparent 50%);
            color: var(--text-main);
            line-height: 1.6;
            padding: 3rem 1.5rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1240px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -0.04em;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #0ea5e9 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 650px;
            margin: 0 auto;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .search-box {
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        #searchBar {
            width: 100%;
            padding: 1.2rem 1.8rem;
            border-radius: 18px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            outline: none;
            font-size: 1.1rem;
            background: white;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        #searchBar:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
        }

        .tag-filter {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-muted);
        }

        .tag-filter:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            color: var(--accent);
        }

        .tag-filter.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            transition: all 0.4s ease;
            height: 100%;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border-color: rgba(14, 165, 233, 0.4);
        }

        .card-img {
            height: 200px;
            width: 100%;
            object-fit: cover;
            border-bottom: 1px solid rgba(226, 232, 240, 0.5);
        }

        .card-body {
            padding: 1.75rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .pill {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            background: rgba(14, 165, 233, 0.1);
            color: var(--accent);
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            color: #0f172a;
        }

        .card-text {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            flex-grow: 1;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e293b;
            color: white;
            text-decoration: none;
            padding: 1rem;
            border-radius: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #000;
            transform: scale(1.02);
        }

        .btn svg {
            width: 18px;
            height: 18px;
            margin-left: 8px;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2.5rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Recursos digitales</h1>
        <p>Pequeño repositorio de recursos digitales para trabajar la lectoescritura en el aula.</p>
    </header>

    <div class="controls">
        <div class="search-box">
            <input type="text" id="searchBar" placeholder="Buscar por herramienta, descripción o categoría...">
        </div>
        <div class="tag-cloud" id="tagCloud">
            <!-- Dinámico -->
        </div>
    </div>

    <main class="grid" id="cardGrid">
        <!-- Dinámico -->
    </main>
</div>

<script>
    // Datos actualizados con URLs de imágenes corregidas
    const rawData = [
        {
            titulo: "GEMA \"Lectora\"",
            desc: "Gema generadora de textos contextualizados y su correspondiente secuencia didáctica.",
            link: "https://gemini.google.com/gem/1EJS9XtUJyS0CUE-v-LGkLON-oEC0vnSQ?usp=sharing",
            tags: ["IA", "Lectura", "Didáctica"],
            img: "https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=800"
        },
        {
            titulo: "GEMA \"Consigna\"",
            desc: "Gema generadora de consignas de escritura para el trabajo específico de la expresión escrita.",
            link: "https://gemini.google.com/gem/1rYZSMx88iTcn1ABHsdFcjJobDo8m4uQi?usp=sharing",
            tags: ["Escritura", "IA", "Creatividad"],
            img: "https://images.unsplash.com/photo-1455390582262-044cdead277a?q=80&w=800"
        },
        {
            titulo: "GEMA \"Proyectos audiovisuales\"",
            desc: "Gema que te da ideas sobre proyectos audiovisuales para tu aula.",
            link: "https://gemini.google.com/gem/1H4UOZgSkGEaOtdp_SQFEbwFJ5YvSJAzo?usp=sharing",
            tags: ["Audiovisual", "Proyectos", "IA"],
            img: "https://images.unsplash.com/photo-1492724441997-5dc865305da7?q=80&w=800"
        },
        {
            titulo: "GEMA \"Mentora de oratoria\"",
            desc: "Gema que te proporciona ideas creativas para trabajar la oralidad en tu aula.",
            link: "https://gemini.google.com/gem/1O9kttk074l1SD4R0iuiXv8QEMSyWJ-sl?usp=sharing",
            tags: ["Oratoria", "Oralidad", "IA"],
            img: "https://images.unsplash.com/photo-1475721027785-f74eccf877e2?q=80&w=800"
        },
        {
            titulo: "Gema \"Radio creativa\"",
            desc: "Gema especialista en dar ideas para llevar la radio al aula de forma creativa y original.",
            link: "https://gemini.google.com/gem/1nRbJNgMxuo-djND1OP7j3bx-uRxtf_iV?usp=sharing",
            tags: ["Radio", "Podcasting", "IA"],
            img: "https://images.unsplash.com/photo-1558403194-611308249627?q=80&w=800"
        },
        {
            titulo: "Gema \"Guiones radiofónicos\"",
            desc: "Gema especialista en la creación de escaletas para todo tipo de programas de radio.",
            link: "https://gemini.google.com/gem/1K6gSxc-l6OHchveGW2duYeDgpUm3lu9c?usp=sharing",
            tags: ["Radio", "Guion", "IA"],
            img: "https://images.unsplash.com/photo-1478737270239-2f02b77fc618?q=80&w=800"
        },
        {
            titulo: "SUNO",
            desc: "IA especializada en la creación de música a partir de texto.",
            link: "https://suno.com",
            tags: ["Música", "IA Generativa"],
            img: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?q=80&w=800"
        },
        {
            titulo: "Producer.AI",
            desc: "IA especializada en la creación de música para producciones.",
            link: "https://www.producer.ai/",
            tags: ["Música", "Producción", "IA"],
            img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=800"
        },
        {
            titulo: "UDIO",
            desc: "Herramienta de IA avanzada para la generación de pistas musicales.",
            link: "https://www.udio.com/",
            tags: ["Música", "IA Generativa"],
            img: "https://images.unsplash.com/photo-1507838153414-b4b713384a76?q=80&w=800"
        },
        {
            titulo: "Plan de actuación",
            desc: "Artículo sobre cómo elaborar el plan de actuación para el trabajo de la lectura.",
            link: "https://blogsaverroes.juntadeandalucia.es/ellocodelamochila/competencia-en-comunicacion-linguistica/el-plan-de-actuacion-para-el-trabajo-de-la-lectura/",
            tags: ["Planificación", "Lectura", "Guía"],
            img: "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?q=80&w=800"
        }
    ];

    const cardGrid = document.getElementById('cardGrid');
    const searchBar = document.getElementById('searchBar');
    const tagCloud = document.getElementById('tagCloud');
    
    let activeTag = null;

    function renderTags() {
        const tags = new Set();
        rawData.forEach(item => item.tags.forEach(t => tags.add(t)));
        
        tagCloud.innerHTML = '<button class="tag-filter active" onclick="filterByTag(null, this)">Todos</button>';
        
        Array.from(tags).sort().forEach(tag => {
            const btn = document.createElement('button');
            btn.className = 'tag-filter';
            btn.textContent = tag;
            btn.onclick = () => filterByTag(tag, btn);
            tagCloud.appendChild(btn);
        });
    }

    function filterByTag(tag, el) {
        document.querySelectorAll('.tag-filter').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        activeTag = tag;
        updateUI();
    }

    function updateUI() {
        const query = searchBar.value.toLowerCase();
        
        const filtered = rawData.filter(item => {
            const matchesSearch = item.titulo.toLowerCase().includes(query) || 
                                 item.desc.toLowerCase().includes(query) ||
                                 item.tags.some(t => t.toLowerCase().includes(query));
            
            const matchesTag = activeTag ? item.tags.includes(activeTag) : true;
            
            return matchesSearch && matchesTag;
        });

        cardGrid.innerHTML = '';
        
        if(filtered.length === 0) {
            cardGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:5rem; color:#94a3b8;">No se encontraron resultados para esta búsqueda.</div>';
            return;
        }

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            // Placeholder si falla la imagen
            const fallbackImg = "https://images.unsplash.com/photo-1614332287897-cdc485fa562d?q=80&w=800";
            
            card.innerHTML = `
                <img src="${item.img}" alt="${item.titulo}" class="card-img" onerror="this.onerror=null;this.src='${fallbackImg}';">
                <div class="card-body">
                    <div class="card-tags">${item.tags.map(t => `<span class="pill">${t}</span>`).join('')}</div>
                    <h3 class="card-title">${item.titulo}</h3>
                    <p class="card-text">${item.desc}</p>
                    <a href="${item.link}" target="_blank" class="btn">
                        Abrir Herramienta
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                        </svg>
                    </a>
                </div>
            `;
            cardGrid.appendChild(card);
        });
    }

    searchBar.addEventListener('input', updateUI);

    window.onload = () => {
        renderTags();
        updateUI();
    };
</script>

</body>
</html>
